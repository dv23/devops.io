# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:name: Build and deploy site to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-path: public
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Build site (convert Markdown -> HTML)
        run: |
          rm -rf public
          mkdir -p public
          # Convert each top-level or subfolder .md to HTML preserving basename
          find . -maxdepth 3 -name '*.md' -not -path './public/*' -not -path './.git/*' | while read -r f; do
            # Skip workflow and other repo config files if needed
            case "$f" in
              "./.github/"* ) continue ;;
            esac
            base="$(basename "${f%.*}")"
            out="public/${base}.html"
            pandoc "$f" -s -o "$out"
          done
          # If you have an index.md, ensure it becomes index.html
          if [ -f "index.md" ]; then mv public/index.html public/index.html || true; fi
          # Copy static assets (if you keep an assets/ folder)
          if [ -d "assets" ]; then cp -R assets public/; fi

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v1
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: echo Hello, world!

      # Runs a set of commands using the runners shell
      - name: Run a multi-line script
        run: |
          echo Add other actions to build,
          echo test, and deploy your project.
